
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.role-btn {
  font-size: 12px; font-weight: 500; padding: 5px 12px;
  border-radius: 20px; border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary); color: var(--color-text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.role-btn.active { background: var(--color-background-tertiary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
.section { margin-bottom: 1.5rem; }
.section-title { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.perm-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); gap: 10px; }
.perm-row:last-child { border-bottom: none; }
.perm-label { font-size: 13px; color: var(--color-text-primary); flex: 0 0 210px; }
.perm-roles { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.badge {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  font-weight: 500; white-space: nowrap;
}
.badge-full   { background: #EAF3DE; color: #3B6D11; }
.badge-read   { background: #E6F1FB; color: #185FA5; }
.badge-own    { background: #FAEEDA; color: #854F0B; }
.badge-none   { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.badge-approve { background: #EEEDFE; color: #534AB7; }
.badge-new    { background: #FAECE7; color: #993C1D; }
@media (prefers-color-scheme: dark) {
  .badge-full   { background: #173404; color: #C0DD97; }
  .badge-read   { background: #042C53; color: #85B7EB; }
  .badge-own    { background: #412402; color: #EF9F27; }
  .badge-approve{ background: #26215C; color: #AFA9EC; }
  .badge-new    { background: #4A1B0C; color: #F0997B; }
}
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.hidden-row { display: none !important; }
.schema-note { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; margin-bottom: 1.25rem; border-left: 2px solid var(--color-border-secondary); }
.schema-note strong { color: var(--color-text-primary); font-weight: 500; }
</style>

function badgeClass(val) {
  if (val === "full")    return "badge badge-full";
  if (val === "own")     return "badge badge-own";
  if (val === "read")    return "badge badge-read";
  if (val === "approve") return "badge badge-approve";
  return "badge badge-none";
}

function badgeLabel(val) {
  if (val === "✗") return "none";
  return val;
}

function render(activeRole) {
  const el = document.getElementById("matrix");
  el.innerHTML = "";
  data.forEach(sec => {
    const div = document.createElement("div");
    div.className = "section";
    div.innerHTML = `<div class="section-title">${sec.section}</div>`;
    sec.rows.forEach(row => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "perm-row";
      const roles = activeRole === "all"
        ? Object.entries(row.perms)
        : [[activeRole, row.perms[activeRole]]];
      const hasAccess = roles.some(([,v]) => v !== "✗");
      if (activeRole !== "all" && !hasAccess) {
        rowDiv.classList.add("hidden-row");
      }
      const badges = roles.map(([role, val]) => {
        const label = activeRole === "all" ? `${role}: ${badgeLabel(val)}` : badgeLabel(val);
        if (val === "✗" && activeRole === "all") return "";
        return `<span class="${badgeClass(val)}">${label}</span>`;
      }).filter(Boolean).join("");
      rowDiv.innerHTML = `<span class="perm-label">${row.label}</span><div class="perm-roles">${badges || '<span class="badge badge-none">no access</span>'}</div>`;
      div.appendChild(rowDiv);
    });
    const visibleRows = div.querySelectorAll(".perm-row:not(.hidden-row)");
    if (visibleRows.length > 0) el.appendChild(div);
  });
}

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".role-btn");
  if (!btn) return;
  document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render(btn.dataset.role);
});

render("all");
