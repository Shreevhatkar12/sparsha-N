version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    command: ["node", "dist/server.js"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - db
    volumes:
      - ./backend:/app/backend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
    working_dir: /app/frontend
    command: ["npm", "run", "preview"]
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    volumes:
      - ./frontend:/app/frontend
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: sparsha
      POSTGRES_PASSWORD: sparsha
      POSTGRES_DB: sparsha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
