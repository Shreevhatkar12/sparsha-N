
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      network: host
    image: sparsha-prod:latest
    working_dir: /app/backend
    command: ["node", "dist/server.js"]
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://sparsha:sparsha@db:5432/sparsha
    depends_on:
      - db

  frontend:
    image: sparsha-prod:latest
    working_dir: /app/frontend
    command: ["npx", "serve", "-s", "dist", "-l", "5173"]
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: sparsha
      POSTGRES_PASSWORD: sparsha
      POSTGRES_DB: sparsha
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
