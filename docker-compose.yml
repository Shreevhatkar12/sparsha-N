
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-build
      network: host
    working_dir: /app/backend
    command: ["node", "dist/server.js"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
      network: host
    working_dir: /app/frontend
    command: ["npm", "run", "preview", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: sparsha
      POSTGRES_PASSWORD: sparsha
      POSTGRES_DB: sparsha
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
